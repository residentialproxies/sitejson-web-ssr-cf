name: Continuous Site Patrol

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: site-patrol
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  patrol:
    name: Site Patrol
    runs-on: ubuntu-latest
    env:
      SITE_PATROL_BASE_URL: https://sitejson.com
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run continuous patrol
        run: bash ./scripts/site-patrol.sh

      - name: Upload patrol log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-patrol-log
          path: .site-patrol/automation-latest.log
          retention-days: 7

      - name: Open or update patrol alert issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Site Patrol Alert';
            const body = [
              'Automated site patrol failed.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
              '',
              'Review the attached patrol log artifact and fix the failing check.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'site-patrol'
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['site-patrol', 'bug']
              });
            }

      - name: Close patrol alert issue after recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Site Patrol Alert';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'site-patrol'
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Automated site patrol recovered in run ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}. Closing alert.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });
